<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #172b4d; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .header { background: #0052cc; padding: 24px 32px; }
    .header a { color: #ffffff; font-size: 20px; font-weight: 700; text-decoration: none; letter-spacing: -0.5px; }
    .body { padding: 32px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 16px; color: #172b4d; }
    p { font-size: 15px; line-height: 1.6; margin: 0 0 16px; color: #344563; }
    .btn { display: inline-block; padding: 12px 24px; background: #0052cc; color: #ffffff !important; text-decoration: none; border-radius: 4px; font-size: 15px; font-weight: 600; margin: 8px 0 16px; }
    .divider { border: none; border-top: 1px solid #ebecf0; margin: 24px 0; }
    .footer { padding: 20px 32px; background: #f4f5f7; font-size: 13px; color: #6b778c; }
    .footer a { color: #6b778c; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 13px; font-weight: 600; }
    .badge-error { background: #ffebe6; color: #bf2600; }
    .badge-warning { background: #fffae6; color: #974f0c; }
    .badge-info { background: #e6fcff; color: #006884; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <a href="{{ frontend_base_url }}">{{ org_name or "Rudix" }}</a>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <hr class="divider" />
    <div class="footer">
      <p style="margin:0">
        You received this email because you are a member of <strong>{{ org_name or "Rudix" }}</strong>.
        {% if unsubscribe_url %}&nbsp;<a href="{{ unsubscribe_url }}">Unsubscribe</a>{% endif %}
      </p>
    </div>
  </div>
</body>
</html>
