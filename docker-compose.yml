services:
  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rag_app}
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin123}@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      MALWARE_SCAN_CLAMAV_HOST: clamav
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clamav:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rag_app}
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin123}@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      MALWARE_SCAN_CLAMAV_HOST: clamav
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clamav:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  mcp:
    profiles: ["mcp"]
    build:
      context: ./backend
    command: python -m app.mcp.main --transport streamable_http
    env_file:
      - .env
    environment:
      FEATURE_ENABLE_MCP: ${FEATURE_ENABLE_MCP:-true}
      MCP_TRANSPORT: streamable_http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8010}
      MCP_HTTP_PATH: ${MCP_HTTP_PATH:-/mcp}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rag_app}
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin123}@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      MALWARE_SCAN_CLAMAV_HOST: clamav
    ports:
      - "${MCP_HTTP_PORT:-8010}:${MCP_HTTP_PORT:-8010}"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clamav:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get('MCP_HTTP_PORT', '8010')}/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set none local/$${MINIO_BUCKET};
      "

  clamav:
    image: clamav/clamav-debian:stable
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/3310'",
        ]
      interval: 20s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin123}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Local model profiles ──────────────────────────────────────────────────
  # Start with:  make up-ollama | make up-vllm | make up-litellm
  # These services are bound to the internal Docker network only (no host
  # ports). API/worker reach them via service-name DNS (e.g. http://ollama:11434).
  # Set LOCAL_LLM_BASE_URL, LOCAL_LLM_MODEL, LLM_DEFAULT_PROVIDER=local in .env.
  # WARNING: local model logs may contain prompt text — treat as sensitive.

  ollama:
    profiles: ["ollama"]
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    # No host-port binding — internal network only.
    # To expose for host tools: add  ports: ["11434:11434"]  in a local override.
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-8g}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  vllm:
    profiles: ["vllm"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    command: >
      --model ${VLLM_MODEL:-mistralai/Mistral-7B-v0.1}
      --host 0.0.0.0
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
    # No host-port binding — internal network only.
    environment:
      HUGGING_FACE_HUB_TOKEN: ${VLLM_HF_TOKEN:-}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: ${VLLM_MEMORY_LIMIT:-16g}
        # Uncomment and adjust to enable NVIDIA GPU pass-through:
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: ${VLLM_GPU_COUNT:-1}
        #       capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  litellm:
    profiles: ["litellm"]
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-latest}
    command: ["--config", "/etc/litellm/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    # No host-port binding — internal network only.
    # WARNING: never commit LITELLM_MASTER_KEY or upstream API keys to version control.
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
      LITELLM_LOG: ${LITELLM_LOG_LEVEL:-WARNING}
    volumes:
      - ./infra/litellm/config.yaml:/etc/litellm/config.yaml:ro
    deploy:
      resources:
        limits:
          memory: ${LITELLM_MEMORY_LIMIT:-2g}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  clamav_data:
  ollama_data:
  vllm_cache:
