services:
  api:
    image: ${RUDIX_API_IMAGE}
    env_file:
      - ../../.env.ci.integration
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rag_app
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s

  worker:
    image: ${RUDIX_WORKER_IMAGE}
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO
    env_file:
      - ../../.env.ci.integration
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rag_app
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  migrate:
    image: ${RUDIX_API_IMAGE}
    command: alembic upgrade head
    profiles: ["migrate"]
    env_file:
      - ../../.env.ci.integration
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rag_app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rag_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_app"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/documents;
      mc anonymous set none local/documents;
      "

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
