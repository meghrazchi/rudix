name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "backend/**"
      - "frontend/**"
      - "ci/**"
      - "deploy/**"
      - ".github/workflows/**"
      - ".env.example"
      - "Makefile"
      - "backend/Makefile"
      - "backend/pyproject.toml"
      - "docker-compose.yml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/next.config.ts"
      - "frontend/playwright.config.ts"
      - "frontend/vitest.config.ts"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ci/**"
      - "deploy/**"
      - ".github/workflows/**"
      - ".env.example"
      - "Makefile"
      - "backend/Makefile"
      - "backend/pyproject.toml"
      - "docker-compose.yml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/next.config.ts"
      - "frontend/playwright.config.ts"
      - "frontend/vitest.config.ts"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_AUTH_PROVIDER: app
  NEXT_PUBLIC_AUTH_LOCAL_FALLBACK: "true"
  NEXT_PUBLIC_AUTH_LOCAL_PASSWORD: "123123123"
  NEXT_PUBLIC_AUTH_DEFAULT_ACCESS_TOKEN: ci-access-token
  NEXT_PUBLIC_AUTH_DEFAULT_ORGANIZATION_ID: 00000000-0000-0000-0000-000000000001
  NEXT_PUBLIC_AUTH_DEFAULT_ORGANIZATION_NAME: Rudix CI
  NEXT_PUBLIC_AUTH_DEFAULT_ROLE: admin
  NEXT_PUBLIC_FEATURE_DEVELOPER_MODE: "false"
  NEXT_PUBLIC_FEATURE_EXPORTS_ENABLED: "true"
  NEXT_PUBLIC_FEATURE_UNAVAILABLE_BACKEND_ENDPOINTS: "true"
  NEXT_PUBLIC_FEATURE_COLLECTIONS_ENABLED: "true"
  NEXT_PUBLIC_CHAT_FEEDBACK_ENABLED: "true"
  NEXT_PUBLIC_CHAT_AGENTIC_ENABLED: "true"
  NEXT_PUBLIC_CHAT_AGENTIC_DEFAULT: "false"
  NEXT_PUBLIC_CHAT_STREAMING_ENABLED: "true"
  NEXT_PUBLIC_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_PUBLIC_PRODUCT_URL: /product
  NEXT_PUBLIC_PUBLIC_SOLUTIONS_URL: /solutions
  NEXT_PUBLIC_PUBLIC_SECURITY_URL: /security
  NEXT_PUBLIC_PUBLIC_PRICING_URL: /pricing
  NEXT_PUBLIC_PUBLIC_DOCS_URL: /docs
  NEXT_PUBLIC_PUBLIC_TRIAL_URL: /signup
  NEXT_PUBLIC_PUBLIC_DEMO_URL: /contact
  NEXT_PUBLIC_PUBLIC_CONTACT_URL: /contact
  NEXT_PUBLIC_PUBLIC_STATUS_URL: /status
  NEXT_PUBLIC_PUBLIC_LOGIN_URL: /login

jobs:
  validate:
    name: Validate config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate environment examples
        run: sh ci/scripts/validate_env_examples.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform format and validate
        working-directory: deploy/terraform
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend tooling
        run: make -C backend install

      - name: Check backend formatting and linting
        run: |
          make -C backend lint
          cd backend
          .venv/bin/ruff format --check app tests

      - name: Run backend tests
        run: |
          mkdir -p artifacts
          cd backend
          .venv/bin/pytest \
            --junitxml=../artifacts/backend-junit.xml \
            --cov=app \
            --cov-report=xml:../artifacts/backend-coverage.xml \
            --cov-report=term

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/backend-junit.xml
            artifacts/backend-coverage.xml
          if-no-files-found: ignore

  backend-alembic:
    name: Backend Alembic validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rag_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rag_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      API_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rag_app
      POSTGRES_DB: rag_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      OPENAI_API_KEY: ci-placeholder-key
      AUTH_PROVIDER: app
      APP_AUTH_SECRET: ci-local-secret
      APP_AUTH_ISSUER: rudix-app
      APP_AUTH_AUDIENCE: rudix-api
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: documents
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION: documents
      QDRANT_BOOTSTRAP_COLLECTION: "true"
      QDRANT_VECTOR_SIZE: "1536"
      QDRANT_DISTANCE: cosine
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      REDIS_URL: redis://localhost:6379/0
      MINIO_BOOTSTRAP_BUCKET: "true"
      LLM_DEFAULT_PROVIDER: openai
      EMBEDDING_DEFAULT_PROVIDER: openai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend tooling
        run: make -C backend install

      - name: Apply and roll back migrations
        run: |
          cd backend
          .venv/bin/alembic upgrade head
          .venv/bin/alembic downgrade -1
          .venv/bin/alembic upgrade head

  frontend:
    name: Frontend quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Format, lint, and typecheck
        working-directory: frontend
        run: |
          npm run format
          npm run lint
          npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Verify generated API types
        working-directory: frontend
        run: npm run api:check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-e2e:
    name: Frontend Playwright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e
