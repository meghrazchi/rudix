name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "backend/**"
      - "frontend/**"
      - "ci/**"
      - "deploy/**"
      - ".github/workflows/**"
      - ".env.example"
      - "Makefile"
      - "backend/Makefile"
      - "backend/pyproject.toml"
      - "docker-compose.yml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/next.config.ts"
      - "frontend/playwright.config.ts"
      - "frontend/vitest.config.ts"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "ci/**"
      - "deploy/**"
      - ".github/workflows/**"
      - ".env.example"
      - "Makefile"
      - "backend/Makefile"
      - "backend/pyproject.toml"
      - "docker-compose.yml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/next.config.ts"
      - "frontend/playwright.config.ts"
      - "frontend/vitest.config.ts"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate environment examples
        run: sh ci/scripts/validate_env_examples.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform format and validate
        working-directory: deploy/terraform
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend tooling
        run: make -C backend install

      - name: Check backend formatting and linting
        run: |
          make -C backend lint
          cd backend
          .venv/bin/ruff format --check app tests

      - name: Run backend tests
        run: |
          mkdir -p artifacts
          cd backend
          .venv/bin/pytest \
            --junitxml=../artifacts/backend-junit.xml \
            --cov=app \
            --cov-report=xml:../artifacts/backend-coverage.xml \
            --cov-report=term

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            artifacts/backend-junit.xml
            artifacts/backend-coverage.xml
          if-no-files-found: ignore

  backend-alembic:
    name: Backend Alembic validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rag_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rag_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      API_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rag_app
      POSTGRES_DB: rag_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      OPENAI_API_KEY: ci-placeholder-key
      AUTH_PROVIDER: app
      APP_AUTH_SECRET: ci-local-secret
      APP_AUTH_ISSUER: rudix-app
      APP_AUTH_AUDIENCE: rudix-api
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: documents
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION: documents
      QDRANT_BOOTSTRAP_COLLECTION: "true"
      QDRANT_VECTOR_SIZE: "1536"
      QDRANT_DISTANCE: cosine
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      REDIS_URL: redis://localhost:6379/0
      MINIO_BOOTSTRAP_BUCKET: "true"
      LLM_DEFAULT_PROVIDER: openai
      EMBEDDING_DEFAULT_PROVIDER: openai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend tooling
        run: make -C backend install

      - name: Apply and roll back migrations
        run: |
          cd backend
          .venv/bin/alembic upgrade head
          .venv/bin/alembic downgrade -1
          .venv/bin/alembic upgrade head

  frontend:
    name: Frontend quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Write frontend env
        run: printf '%s' "${{ secrets.FRONTEND_ENV_STAGING }}" > frontend/.env.local

      - name: Format, lint, and typecheck
        working-directory: frontend
        run: |
          npm run format
          npm run lint
          npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Verify generated API types
        working-directory: frontend
        run: npm run api:check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

