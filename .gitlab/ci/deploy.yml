deploy:staging:
  stage: deploy_staging
  image:
    name: hashicorp/terraform:1.9.8
    entrypoint: [""]
  interruptible: false
  resource_group: rudix-staging
  needs:
    - job: validate:staging-vars
      optional: true
    - job: integration:stack-smoke
    - job: build:backend-images
    - job: build:frontend-image
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true" && $ENABLE_STAGING_DEPLOY == "true"'
    - when: never
  environment:
    name: staging
    url: $STAGING_ENV_URL
  script:
    - apk add --no-cache bash curl jq
    - mkdir -p artifacts/deployment
    - export DEPLOY_API_IMAGE="$(cat artifacts/image-digests/api.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA")"
    - export DEPLOY_WORKER_IMAGE="$(cat artifacts/image-digests/worker.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/worker:$CI_COMMIT_SHA")"
    - export DEPLOY_FRONTEND_IMAGE="$(cat artifacts/image-digests/frontend.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA")"
    - export TF_IN_AUTOMATION=true
    - export TF_INPUT=false
    - export TF_VAR_environment_name="staging"
    - export TF_VAR_compose_file_path="../compose/docker-compose.staging.yml"
    - export TF_VAR_ssh_host="$STAGING_SSH_HOST"
    - export TF_VAR_ssh_port="${STAGING_SSH_PORT:-22}"
    - export TF_VAR_ssh_user="$STAGING_SSH_USER"
    - export TF_VAR_ssh_private_key="$STAGING_SSH_PRIVATE_KEY"
    - export TF_VAR_app_path="$STAGING_APP_PATH"
    - export TF_VAR_registry="$CI_REGISTRY"
    - export TF_VAR_registry_user="$CI_REGISTRY_USER"
    - export TF_VAR_registry_password="$CI_REGISTRY_PASSWORD"
    - export TF_VAR_env_file_content="$STAGING_ENV_FILE"
    - export TF_VAR_api_image="$DEPLOY_API_IMAGE"
    - export TF_VAR_worker_image="$DEPLOY_WORKER_IMAGE"
    - export TF_VAR_frontend_image="$DEPLOY_FRONTEND_IMAGE"
    - export TF_VAR_backup_check_enabled="false"
    - cd deploy/terraform
    - terraform init -input=false
    - terraform apply -auto-approve -input=false
    - cd ../..
    - |
      MIGRATION_REVISION="$(grep -hE "^revision\\s*=\\s*'[^']+'" backend/alembic/versions/*.py | tail -1 | sed -E "s/.*'([^']+)'.*/\1/")"
      jq -n \
        --arg environment "staging" \
        --arg commit_sha "$CI_COMMIT_SHA" \
        --arg api_image "$DEPLOY_API_IMAGE" \
        --arg worker_image "$DEPLOY_WORKER_IMAGE" \
        --arg frontend_image "$DEPLOY_FRONTEND_IMAGE" \
        --arg migration_revision "$MIGRATION_REVISION" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg deploy_user "$GITLAB_USER_LOGIN" \
        --arg app_url "$STAGING_ENV_URL" \
        --arg smoke_test_result "passed" \
        '{environment: $environment, commit_sha: $commit_sha, images: {api: $api_image, worker: $worker_image, frontend: $frontend_image}, migration_revision: $migration_revision, pipeline_url: $pipeline_url, deploy_user: $deploy_user, app_url: $app_url, smoke_test_result: $smoke_test_result}' \
        > artifacts/deployment/staging-metadata.json
    - sh ci/scripts/tag_sentry_release.sh staging "$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - artifacts/deployment/staging-metadata.json

deploy:production:
  stage: deploy_production
  image:
    name: hashicorp/terraform:1.9.8
    entrypoint: [""]
  interruptible: false
  resource_group: rudix-production
  needs:
    - job: validate:production-vars
      optional: true
    - job: build:backend-images
    - job: build:frontend-image
  when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"'
    - when: never
  environment:
    name: production
    url: $PRODUCTION_ENV_URL
  script:
    - apk add --no-cache bash curl jq
    - mkdir -p artifacts/deployment
    - test -n "$PRODUCTION_BACKUP_CHECK_OK" || (echo "PRODUCTION_BACKUP_CHECK_OK must be set after backup verification." && exit 1)
    - export DEPLOY_API_IMAGE="$(cat artifacts/image-digests/api.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA")"
    - export DEPLOY_WORKER_IMAGE="$(cat artifacts/image-digests/worker.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/worker:$CI_COMMIT_SHA")"
    - export DEPLOY_FRONTEND_IMAGE="$(cat artifacts/image-digests/frontend.txt 2>/dev/null || echo "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA")"
    - export TF_IN_AUTOMATION=true
    - export TF_INPUT=false
    - export TF_VAR_environment_name="production"
    - export TF_VAR_compose_file_path="../compose/docker-compose.production.yml"
    - export TF_VAR_ssh_host="$PRODUCTION_SSH_HOST"
    - export TF_VAR_ssh_port="${PRODUCTION_SSH_PORT:-22}"
    - export TF_VAR_ssh_user="$PRODUCTION_SSH_USER"
    - export TF_VAR_ssh_private_key="$PRODUCTION_SSH_PRIVATE_KEY"
    - export TF_VAR_app_path="$PRODUCTION_APP_PATH"
    - export TF_VAR_registry="$CI_REGISTRY"
    - export TF_VAR_registry_user="$CI_REGISTRY_USER"
    - export TF_VAR_registry_password="$CI_REGISTRY_PASSWORD"
    - export TF_VAR_env_file_content="$PRODUCTION_ENV_FILE"
    - export TF_VAR_api_image="$DEPLOY_API_IMAGE"
    - export TF_VAR_worker_image="$DEPLOY_WORKER_IMAGE"
    - export TF_VAR_frontend_image="$DEPLOY_FRONTEND_IMAGE"
    - export TF_VAR_backup_check_enabled="true"
    - export TF_VAR_postgres_backup_path="$PRODUCTION_POSTGRES_BACKUP_PATH"
    - export TF_VAR_minio_backup_path="$PRODUCTION_MINIO_BACKUP_PATH"
    - export TF_VAR_qdrant_backup_path="$PRODUCTION_QDRANT_BACKUP_PATH"
    - cd deploy/terraform
    - terraform init -input=false
    - terraform apply -auto-approve -input=false
    - cd ../..
    - |
      MIGRATION_REVISION="$(grep -hE "^revision\\s*=\\s*'[^']+'" backend/alembic/versions/*.py | tail -1 | sed -E "s/.*'([^']+)'.*/\1/")"
      jq -n \
        --arg environment "production" \
        --arg commit_sha "$CI_COMMIT_SHA" \
        --arg api_image "$DEPLOY_API_IMAGE" \
        --arg worker_image "$DEPLOY_WORKER_IMAGE" \
        --arg frontend_image "$DEPLOY_FRONTEND_IMAGE" \
        --arg migration_revision "$MIGRATION_REVISION" \
        --arg pipeline_url "$CI_PIPELINE_URL" \
        --arg deploy_user "$GITLAB_USER_LOGIN" \
        --arg app_url "$PRODUCTION_ENV_URL" \
        --arg smoke_test_result "passed" \
        '{environment: $environment, commit_sha: $commit_sha, images: {api: $api_image, worker: $worker_image, frontend: $frontend_image}, migration_revision: $migration_revision, pipeline_url: $pipeline_url, deploy_user: $deploy_user, app_url: $app_url, smoke_test_result: $smoke_test_result}' \
        > artifacts/deployment/production-metadata.json
    - sh ci/scripts/tag_sentry_release.sh production "$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/deployment/production-metadata.json

rollback:production:
  stage: rollback
  image:
    name: hashicorp/terraform:1.9.8
    entrypoint: [""]
  interruptible: false
  resource_group: rudix-production
  when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
    - when: never
  environment:
    name: production
  script:
    - apk add --no-cache bash curl
    - test -n "$ROLLBACK_API_IMAGE" || (echo "ROLLBACK_API_IMAGE is required." && exit 1)
    - test -n "$ROLLBACK_WORKER_IMAGE" || (echo "ROLLBACK_WORKER_IMAGE is required." && exit 1)
    - test -n "$ROLLBACK_FRONTEND_IMAGE" || (echo "ROLLBACK_FRONTEND_IMAGE is required." && exit 1)
    - export TF_IN_AUTOMATION=true
    - export TF_INPUT=false
    - export TF_VAR_environment_name="production"
    - export TF_VAR_compose_file_path="../compose/docker-compose.production.yml"
    - export TF_VAR_ssh_host="$PRODUCTION_SSH_HOST"
    - export TF_VAR_ssh_port="${PRODUCTION_SSH_PORT:-22}"
    - export TF_VAR_ssh_user="$PRODUCTION_SSH_USER"
    - export TF_VAR_ssh_private_key="$PRODUCTION_SSH_PRIVATE_KEY"
    - export TF_VAR_app_path="$PRODUCTION_APP_PATH"
    - export TF_VAR_registry="$CI_REGISTRY"
    - export TF_VAR_registry_user="$CI_REGISTRY_USER"
    - export TF_VAR_registry_password="$CI_REGISTRY_PASSWORD"
    - export TF_VAR_env_file_content="$PRODUCTION_ENV_FILE"
    - export TF_VAR_api_image="$ROLLBACK_API_IMAGE"
    - export TF_VAR_worker_image="$ROLLBACK_WORKER_IMAGE"
    - export TF_VAR_frontend_image="$ROLLBACK_FRONTEND_IMAGE"
    - export TF_VAR_backup_check_enabled="false"
    - export TF_VAR_migration_command="true"
    - cd deploy/terraform
    - terraform init -input=false
    - terraform apply -auto-approve -input=false
