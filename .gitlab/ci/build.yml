build:backend-images:
  stage: build
  extends:
    - .docker:dind
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - changes:
        - backend/**/*
        - backend/Dockerfile
        - .gitlab-ci.yml
        - .gitlab/ci/build.yml
    - when: never
  script:
    - mkdir -p artifacts/image-digests
    - BACKEND_SOURCE_IMAGE="$CI_REGISTRY_IMAGE/backend-build:$CI_COMMIT_SHA"
    - docker build -f backend/Dockerfile -t "$BACKEND_SOURCE_IMAGE" backend
    - |
      IMAGE_TAGS="$CI_COMMIT_SHA"
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        IMAGE_TAGS="$IMAGE_TAGS staging latest"
      fi
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAGS="$IMAGE_TAGS $CI_COMMIT_TAG"
      fi

      for target in api worker; do
        for tag in $IMAGE_TAGS; do
          IMAGE_REF="$CI_REGISTRY_IMAGE/$target:$tag"
          docker tag "$BACKEND_SOURCE_IMAGE" "$IMAGE_REF"
          docker push "$IMAGE_REF"
        done
        docker pull "$CI_REGISTRY_IMAGE/$target:$CI_COMMIT_SHA"
        docker inspect --format='{{index .RepoDigests 0}}' "$CI_REGISTRY_IMAGE/$target:$CI_COMMIT_SHA" > "artifacts/image-digests/$target.txt"
      done
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/image-digests/api.txt
      - artifacts/image-digests/worker.txt

build:frontend-image:
  stage: build
  extends:
    - .docker:dind
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - changes:
        - frontend/**/*
        - frontend/Dockerfile
        - .gitlab-ci.yml
        - .gitlab/ci/build.yml
    - when: never
  script:
    - mkdir -p artifacts/image-digests
    - docker build -f frontend/Dockerfile -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/frontend:staging"
        docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/frontend:latest"
        docker push "$CI_REGISTRY_IMAGE/frontend:staging"
        docker push "$CI_REGISTRY_IMAGE/frontend:latest"
      fi
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_TAG"
      fi
    - docker pull "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - docker inspect --format='{{index .RepoDigests 0}}' "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" > artifacts/image-digests/frontend.txt
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - artifacts/image-digests/frontend.txt
