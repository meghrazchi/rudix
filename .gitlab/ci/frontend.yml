frontend:format-lint-typecheck:
  stage: test
  image: node:22-bookworm
  extends:
    - .rules:frontend-changes
    - .cache:npm
  before_script:
    - cd frontend
    - npm ci --cache "$NPM_CONFIG_CACHE"
  script:
    - npm run format
    - npm run lint
    - npm run typecheck

frontend:test:
  stage: test
  image: node:22-bookworm
  extends:
    - .rules:frontend-changes
    - .cache:npm
  before_script:
    - cd frontend
    - npm ci --cache "$NPM_CONFIG_CACHE"
  script:
    - npm run test

frontend:build:
  stage: test
  image: node:22-bookworm
  extends:
    - .rules:frontend-changes
    - .cache:npm
  before_script:
    - cd frontend
    - npm ci --cache "$NPM_CONFIG_CACHE"
  script:
    - npm run build
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - frontend/.next

frontend:e2e:
  stage: integration
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  extends:
    - .rules:frontend-changes
    - .cache:npm
  variables:
    PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
  before_script:
    - cd frontend
    - npm ci --cache "$NPM_CONFIG_CACHE"
  script:
    - npm run test:e2e
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - frontend/test-results
