container_scanning:
  stage: security
  variables:
    CS_IMAGE: "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA"
  rules:
    - changes:
        - backend/**/*
        - backend/Dockerfile
        - .gitlab-ci.yml
        - .gitlab/ci/security.yml
        - .gitlab/ci/build.yml
    - when: never

security:severity-gate:
  stage: security
  image: python:3.12-slim
  needs:
    - job: dependency_scanning
      optional: true
    - job: container_scanning
      optional: true
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
    - when: never
  script:
    - python ci/scripts/security_severity_gate.py
