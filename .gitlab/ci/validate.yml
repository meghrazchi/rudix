validate:env-example:
  stage: validate
  image: alpine:3.20
  script:
    - sh ci/scripts/validate_env_examples.sh

validate:staging-vars:
  stage: validate
  image: alpine:3.20
  script:
    - sh ci/scripts/validate_required_ci_vars.sh staging
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true" && $ENABLE_STAGING_DEPLOY == "true"'
    - if: '$ENABLE_STAGING_VALIDATION == "true"'
    - when: never

validate:production-vars:
  stage: validate
  image: alpine:3.20
  script:
    - sh ci/scripts/validate_required_ci_vars.sh production
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true"'
    - if: '$ENABLE_PRODUCTION_VALIDATION == "true"'
    - when: never
