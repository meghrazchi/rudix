# Quality gate CI job — F149
#
# Runs the evaluation quality gate against a completed staging evaluation run
# before production deploy is allowed. A failed gate blocks the deploy unless
# manually overridden via the Rudix admin UI with a documented reason.
#
# Required CI/CD variables (set in GitLab project/group settings):
#   RUDIX_API_BASE_URL      — Staging API base URL, e.g. https://staging.example.com/api/v1
#   RUDIX_API_TOKEN         — Service-account bearer token with admin role
#   QUALITY_GATE_ID         — UUID of the gate config created for this milestone
#
# Optional:
#   EVALUATION_RUN_ID       — UUID of the evaluation run to gate on (overrides BASELINE_EVAL_RUN_ID)
#   SAFETY_EVAL_RUN_ID      — UUID of the safety eval run to gate on
#   QUALITY_GATE_DRY_RUN    — Set to '1' to evaluate without blocking (useful for initial rollout)

.quality_gate:base:
  stage: integration
  image: python:3.12-slim
  variables:
    QUALITY_GATE_REPORT_PATH: artifacts/quality-gate-report.json
  script:
    - mkdir -p artifacts
    - |
      if [ -z "${QUALITY_GATE_ID:-}" ]; then
        echo "[quality-gate] QUALITY_GATE_ID is not set — skipping gate."
        exit 0
      fi
    - python ci/scripts/quality_gate_runner.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/quality-gate-report.json
    reports:
      # Expose the report in the GitLab MR widget if a JUnit-compatible format is supported.
      # The JSON report is the primary artifact; further parsing can be added here.
      dotenv: artifacts/quality-gate.env

# Staging quality gate — runs after integration smoke tests, blocks staging deploy.
quality-gate:staging:
  extends:
    - .quality_gate:base
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true" && $ENABLE_QUALITY_GATE == "true"'
    - when: never
  needs:
    - job: integration:stack-smoke
  before_script:
    - |
      # Write a dotenv artifact so downstream jobs can read gate verdict.
      mkdir -p artifacts
      echo "QUALITY_GATE_VERDICT=pending" > artifacts/quality-gate.env
  after_script:
    - |
      if [ -f artifacts/quality-gate-report.json ]; then
        VERDICT="$(python3 -c "import json,sys; r=json.load(open('artifacts/quality-gate-report.json')); print(r.get('verdict','unknown'))")"
        echo "QUALITY_GATE_VERDICT=${VERDICT}" > artifacts/quality-gate.env
        echo "[quality-gate] Final verdict: ${VERDICT}"
      fi

# Production quality gate — runs against a tagged release, blocks production deploy.
quality-gate:production:
  extends:
    - .quality_gate:base
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $ENABLE_QUALITY_GATE == "true"'
    - when: never
  needs:
    - job: build:backend-images
    - job: build:frontend-image
  before_script:
    - |
      mkdir -p artifacts
      echo "QUALITY_GATE_VERDICT=pending" > artifacts/quality-gate.env
  after_script:
    - |
      if [ -f artifacts/quality-gate-report.json ]; then
        VERDICT="$(python3 -c "import json,sys; r=json.load(open('artifacts/quality-gate-report.json')); print(r.get('verdict','unknown'))")"
        echo "QUALITY_GATE_VERDICT=${VERDICT}" > artifacts/quality-gate.env
        echo "[quality-gate] Final verdict: ${VERDICT}"
      fi
